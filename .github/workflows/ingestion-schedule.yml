name: Proactive Book Ingestion Loop

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  proactive_ingestion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      # In a real environment, you might use a CLI tool like `claude` or `agy` to trigger the /goal command.
      # For demonstration, we simulate checking the raw_data folder and running the agentic loop.
      - name: Check for new raw data
        id: check_data
        run: |
          if [ -d "raw_data" ] && [ "$(ls -A raw_data)" ]; then
            echo "New data found. Triggering Agentic Goal-based Ingestion Loop."
            echo "has_data=true" >> $GITHUB_OUTPUT
          else
            echo "No new data. Exiting loop."
            echo "has_data=false" >> $GITHUB_OUTPUT
          fi

      - name: Execute /goal Agentic Loop
        if: steps.check_data.outputs.has_data == 'true'
        run: |
          echo "Simulating Agentic Loop execution..."
          # Replace with actual agent CLI invocation, e.g.:
          # agy "Use /goal to ingest all txt files in raw_data/ following the book-ingestion workflow."
          echo "Agentic Loop completed."

      - name: Create Pull Request
        if: steps.check_data.outputs.has_data == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(ingest): autonomous proactive ingestion loop"
          title: "Autonomous Book Ingestion from raw_data"
          body: |
            This PR was automatically generated by the **Proactive Book Ingestion Loop**.
            The agent has autonomously parsed the raw text, fixed OCR errors, extracted metadata, and verified the output.
          branch: "auto-ingest-loop"
          base: "main"
